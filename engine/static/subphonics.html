<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBPHONICS — DUBFORGE Project Director</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   SUBPHONICS CHAT UI — Dark Bass Music Aesthetic
   ═══════════════════════════════════════════════════════════════ */

:root {
  --bg-dark: #0a0a0f;
  --bg-mid: #12121a;
  --bg-light: #1a1a28;
  --bg-input: #1e1e2e;
  --accent-purple: #b44aff;
  --accent-blue: #00d4ff;
  --accent-pink: #ff44aa;
  --accent-green: #44ff88;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --text-dim: #555577;
  --border: #2a2a3a;
  --glow-purple: rgba(180, 74, 255, 0.3);
  --glow-blue: rgba(0, 212, 255, 0.2);
  --phi: 1.618;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: var(--font-sans);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── HEADER ─────────────────────────────────────────────── */

.header {
  background: linear-gradient(135deg, var(--bg-mid), var(--bg-light));
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    var(--accent-purple),
    var(--accent-blue),
    var(--accent-pink),
    var(--accent-purple));
  background-size: 200% 100%;
  animation: gradient-flow 3s linear infinite;
}

@keyframes gradient-flow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 8px var(--accent-green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
}

.phi-display {
  color: var(--accent-purple);
  font-weight: 600;
}

/* ─── MAIN LAYOUT ────────────────────────────────────────── */

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── SIDEBAR ────────────────────────────────────────────── */

.sidebar {
  width: 260px;
  background: var(--bg-mid);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.module-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.module-list::-webkit-scrollbar {
  width: 4px;
}
.module-list::-webkit-scrollbar-track {
  background: transparent;
}
.module-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

.module-category {
  margin-bottom: 12px;
}

.category-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--accent-purple);
  text-transform: uppercase;
  padding: 4px 8px;
  margin-bottom: 4px;
}

.module-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
  transition: all 0.15s ease;
}

.module-item:hover {
  background: var(--bg-light);
  color: var(--text-primary);
}

.module-item:active {
  background: rgba(180, 74, 255, 0.15);
}

.module-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.module-dot.synth { background: var(--accent-blue); }
.module-dot.fx { background: var(--accent-pink); }
.module-dot.drums { background: var(--accent-green); }
.module-dot.pipeline { background: #ffaa44; }
.module-dot.export { background: #44aaff; }
.module-dot.analysis { background: var(--accent-purple); }
.module-dot.structure { background: #ffff44; }
.module-dot.system { background: #ff4444; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
}

/* ─── CHAT AREA ──────────────────────────────────────────── */

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.messages::-webkit-scrollbar {
  width: 6px;
}
.messages::-webkit-scrollbar-track {
  background: transparent;
}
.messages::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* ─── MESSAGE BUBBLES ────────────────────────────────────── */

.message {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: msg-in 0.3s ease-out;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message.subphonics {
  align-self: flex-start;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  font-weight: 700;
}

.avatar.subphonics-avatar {
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  color: white;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
}

.avatar.user-avatar {
  background: var(--bg-light);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.bubble {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}

.message.subphonics .bubble {
  background: var(--bg-light);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.message.user .bubble {
  background: linear-gradient(135deg, rgba(180, 74, 255, 0.2), rgba(0, 212, 255, 0.15));
  border: 1px solid rgba(180, 74, 255, 0.3);
  border-bottom-right-radius: 4px;
}

.bubble strong {
  color: var(--accent-blue);
  font-weight: 600;
}

.bubble em {
  color: var(--text-secondary);
  font-style: italic;
}

.bubble code {
  background: var(--bg-dark);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent-green);
}

.timestamp {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  font-family: var(--font-mono);
}

/* ─── TYPING INDICATOR ───────────────────────────────────── */

.typing-indicator {
  display: none;
  align-self: flex-start;
  padding: 8px 16px;
  gap: 4px;
  align-items: center;
}

.typing-indicator.active {
  display: flex;
}

.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-purple);
  animation: typing-bounce 1.4s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ─── INPUT AREA ─────────────────────────────────────────── */

.input-area {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg-mid);
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

#chat-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  transition: border-color 0.2s ease;
}

#chat-input:focus {
  border-color: var(--accent-purple);
  box-shadow: 0 0 0 2px var(--glow-purple);
}

#chat-input::placeholder {
  color: var(--text-dim);
}

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.send-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 16px var(--glow-purple);
}

.send-btn:active {
  transform: scale(0.95);
}

.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* ─── QUICK ACTIONS ──────────────────────────────────────── */

.quick-actions {
  display: flex;
  gap: 8px;
  padding: 8px 24px 0;
  flex-wrap: wrap;
}

.quick-btn {
  padding: 4px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 11px;
  font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.15s ease;
}

.quick-btn:hover {
  border-color: var(--accent-purple);
  color: var(--accent-purple);
  background: rgba(180, 74, 255, 0.08);
}

/* ─── WAVEFORM VISUALIZER ────────────────────────────────── */

.waveform-bar {
  height: 3px;
  background: var(--bg-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1px;
  padding: 0 24px;
  overflow: hidden;
}

.wave-line {
  width: 2px;
  height: 2px;
  background: var(--accent-purple);
  border-radius: 1px;
  opacity: 0.3;
  transition: height 0.1s ease;
}

/* ─── RESPONSIVE ─────────────────────────────────────────── */

@media (max-width: 768px) {
  .sidebar { display: none; }
  .header-right { display: none; }
  .messages { padding: 12px 16px; }
  .input-area { padding: 12px 16px; }
  .message { max-width: 95%; }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <div class="status-dot"></div>
    <div class="logo">SUBPHONICS</div>
    <span style="font-size:11px; color:var(--text-dim); font-family:var(--font-mono)">
      DUBFORGE Project Director
    </span>
  </div>
  <div class="header-right">
    <span class="phi-display">φ 1.6180339887</span>
    <span>432 Hz</span>
    <span id="module-count">—</span>
    <span id="status-indicator">ONLINE</span>
  </div>
</div>

<!-- ═══ WAVEFORM BAR ═══ -->
<div class="waveform-bar" id="waveform"></div>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar">
    <div class="sidebar-header">Engine Modules</div>
    <div class="module-list" id="module-list"></div>
    <div class="sidebar-footer">
      DUBFORGE v4.0.0 • Grandmaster 144
    </div>
  </div>

  <!-- ═══ CHAT ═══ -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn" onclick="quickSend('status')">Status</button>
      <button class="quick-btn" onclick="quickSend('help')">Commands</button>
      <button class="quick-btn" onclick="quickSend('list modules')">Modules</button>
      <button class="quick-btn" onclick="quickSend('make sub bass')">Sub Bass</button>
      <button class="quick-btn" onclick="quickSend('make drums')">Drums</button>
      <button class="quick-btn" onclick="quickSend('render wobble bass')">Wobble</button>
      <button class="quick-btn" onclick="quickSend('analyze phi')">Phi Analysis</button>
      <button class="quick-btn" onclick="quickSend('pipeline')">Pipeline</button>
      <button class="quick-btn" onclick="quickSend('audit')">Audit</button>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input"
                  placeholder="Talk to SUBPHONICS..."
                  rows="1"
                  onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">▶</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SUBPHONICS CHAT CLIENT
// ═══════════════════════════════════════════════════════════════

const API_BASE = '';  // Same origin
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const typingEl = document.getElementById('typing');
const moduleListEl = document.getElementById('module-list');
const moduleCountEl = document.getElementById('module-count');
const waveformEl = document.getElementById('waveform');

// ─── Init ────────────────────────────────────────────────────

async function init() {
  buildWaveform();
  loadModules();
  loadGreeting();
  inputEl.focus();
}

function buildWaveform() {
  const count = Math.floor(window.innerWidth / 3);
  for (let i = 0; i < count; i++) {
    const line = document.createElement('div');
    line.className = 'wave-line';
    waveformEl.appendChild(line);
  }
  animateWaveform();
}

function animateWaveform() {
  const lines = waveformEl.children;
  for (let i = 0; i < lines.length; i++) {
    const h = 1 + Math.random() * 2;
    lines[i].style.height = h + 'px';
    lines[i].style.opacity = 0.2 + Math.random() * 0.3;
  }
  requestAnimationFrame(() => setTimeout(animateWaveform, 100));
}

// ─── Load modules into sidebar ───────────────────────────────

async function loadModules() {
  try {
    const resp = await fetch(API_BASE + '/api/modules');
    const data = await resp.json();
    moduleCountEl.textContent = data.total + ' modules';
    renderModuleSidebar(data.modules);
  } catch (e) {
    moduleCountEl.textContent = 'offline';
  }
}

function renderModuleSidebar(modules) {
  const byCategory = {};
  modules.forEach(m => {
    if (!byCategory[m.category]) byCategory[m.category] = [];
    byCategory[m.category].push(m);
  });

  moduleListEl.innerHTML = '';
  const catOrder = ['synth','fx','drums','pipeline','export','analysis','structure','system'];
  catOrder.forEach(cat => {
    if (!byCategory[cat]) return;
    const catDiv = document.createElement('div');
    catDiv.className = 'module-category';
    catDiv.innerHTML = `<div class="category-label">${cat}</div>`;

    byCategory[cat].forEach(m => {
      const item = document.createElement('div');
      item.className = 'module-item';
      item.title = m.description;
      item.innerHTML = `<div class="module-dot ${cat}"></div><span>${m.name}</span>`;
      item.onclick = () => quickSend(`render ${m.name}`);
      catDiv.appendChild(item);
    });

    moduleListEl.appendChild(catDiv);
  });
}

// ─── Load greeting ───────────────────────────────────────────

async function loadGreeting() {
  try {
    const resp = await fetch(API_BASE + '/api/greeting');
    const data = await resp.json();
    addMessage('subphonics', data.greeting);
  } catch (e) {
    addMessage('subphonics',
      'SUBPHONICS online. Connection established. What are we building?');
  }
}

// ─── Send message ────────────────────────────────────────────

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage('user', text);
  showTyping(true);

  // Trigger waveform burst
  burstWaveform();

  try {
    const resp = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await resp.json();
    showTyping(false);
    addMessage('subphonics', data.content, data.metadata);
  } catch (e) {
    showTyping(false);
    addMessage('subphonics',
      'Connection disrupted. The frequencies are realigning. Try again.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function quickSend(text) {
  inputEl.value = text;
  sendMessage();
}

// ─── Add message to chat ─────────────────────────────────────

function addMessage(role, content, metadata) {
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'subphonics' ? 'subphonics-avatar' : 'user-avatar'}`;
  avatar.textContent = role === 'subphonics' ? 'SP' : '⟩';

  const bubbleWrap = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatContent(content);

  const ts = document.createElement('div');
  ts.className = 'timestamp';
  ts.textContent = new Date().toLocaleTimeString();

  bubbleWrap.appendChild(bubble);
  bubbleWrap.appendChild(ts);

  msg.appendChild(avatar);
  msg.appendChild(bubbleWrap);

  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── Format content (basic markdown) ─────────────────────────

function formatContent(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/_(.*?)_/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>')
    .replace(/•/g, '<br>•');
}

// ─── Typing indicator ────────────────────────────────────────

function showTyping(show) {
  typingEl.classList.toggle('active', show);
  if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── Waveform burst on send ──────────────────────────────────

function burstWaveform() {
  const lines = waveformEl.children;
  for (let i = 0; i < lines.length; i++) {
    const h = 1 + Math.random() * 12;
    lines[i].style.height = h + 'px';
    lines[i].style.opacity = 0.5 + Math.random() * 0.5;
  }
  setTimeout(() => {
    for (let i = 0; i < lines.length; i++) {
      lines[i].style.height = (1 + Math.random() * 2) + 'px';
      lines[i].style.opacity = 0.2 + Math.random() * 0.3;
    }
  }, 600);
}

// ─── Keyboard handling ───────────────────────────────────────

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }

  // Auto-resize textarea
  setTimeout(() => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }, 0);
}

// ─── Launch ──────────────────────────────────────────────────

init();
</script>
</body>
</html>
