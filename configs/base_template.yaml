# ═══════════════════════════════════════════════════════════════════════════
# DUBFORGE — Base Template Configuration v1.0
# ═══════════════════════════════════════════════════════════════════════════
# Generic dubstep/bass music template that loads in Ableton Live 12.
# Override any section in a track-specific config to customise.
#
# Workflow (ill.Gates / Producer Dojo / Subtronics-inspired):
#   Phase 1 — SOUND DESIGN: Each track gets auto-assigned patches + FX
#   Phase 2 — ARRANGEMENT: Fibonacci-structured sections, cue markers
#   Phase 3 — MIDI: Auto-generated per-track patterns (bass/lead/drums/etc)
#   Phase 4 — AUTOMATION: Filter sweeps, LFOs, sends, sidechain — all automated
#   Phase 5 — MIX: Volume, panning, sends pre-configured
#   Phase 6 — EXPORT: .als + .mid + .fxp presets
# ═══════════════════════════════════════════════════════════════════════════

version: "1.0"
template_name: DUBFORGE_BASE

# ───────────────────────────────────────────────────────────
# GLOBAL SETTINGS
# ───────────────────────────────────────────────────────────

global:
  bpm: 150
  time_sig: [4, 4]
  key: D_minor
  tuning_a4: 432        # -32 cents global detune in Serum 2
  total_bars: 144       # Fibonacci: 144 = F(12)
  golden_ratio: 0.618   # phi — golden section for climax placement

  # Bass note roots per chord index (cycled every 2 bars)
  chord_progression:
    - D2    # i
    - G2    # iv
    - Bb2   # VI
    - A2    # v

  # Velocity humanisation (PHI-based)
  humanize:
    enabled: true
    strength: 0.15      # max deviation as fraction of base velocity
    method: phi_sine     # sin(beat * PHI * 2) — non-repeating natural feel

# ───────────────────────────────────────────────────────────
# ARRANGEMENT (Fibonacci bar counts)
# ───────────────────────────────────────────────────────────
# Section types: intro, verse, build, drop, break, bridge, vip, outro
# Each section has a type that triggers specific generators/automation

arrangement:
  - { name: INTRO,         type: intro,   bars: 8  }
  - { name: BUILD_1,       type: build,   bars: 5  }
  - { name: DROP_1,        type: drop,    bars: 13 }
  - { name: BREAK_1,       type: break,   bars: 5  }
  - { name: BUILD_2,       type: build,   bars: 8  }
  - { name: DROP_2,        type: drop,    bars: 34 }
  - { name: BREAK_2,       type: break,   bars: 3  }
  - { name: BUILD_3,       type: build,   bars: 5  }
  - { name: DROP_3,        type: drop,    bars: 21 }  # golden section
  - { name: BREAK_3,       type: break,   bars: 5  }
  - { name: BUILD_4,       type: build,   bars: 8  }
  - { name: DROP_4,        type: drop,    bars: 21 }
  - { name: OUTRO,         type: outro,   bars: 8  }

# ───────────────────────────────────────────────────────────
# TRACK DEFINITIONS
# ───────────────────────────────────────────────────────────
# 15 MIDI tracks + 2 return tracks
# Each track has: role, color, volume, pan, synth, preset, automation rules

tracks:
  # === DRUMS (Drum Rack) ===
  DRUMS:
    role: drums
    color: 69         # Red
    volume_db: 0.0
    pan: 0.0
    synth: null       # Drum Rack — no synth
    pads:
      - { note: 36, name: Kick,     choke: -1 }
      - { note: 37, name: Rim,      choke: 2  }
      - { note: 38, name: Snare,    choke: -1 }
      - { note: 39, name: Clap,     choke: -1 }
      - { note: 42, name: HH_Cl,    choke: 1  }
      - { note: 46, name: HH_Op,    choke: 1  }
      - { note: 49, name: Crash,    choke: -1 }
      - { note: 51, name: Ride,     choke: -1 }
      - { note: 56, name: Perc_1,   choke: -1 }
      - { note: 57, name: Perc_2,   choke: -1 }
      - { note: 75, name: Clav,     choke: -1 }
    # Drums auto-generate per section type:
    #   intro: sparse hats building
    #   build: accelerating snare + kick density
    #   drop:  four-on-floor kick + heavy snare
    #   break: minimal perc + snare rolls
    #   outro: decaying sparse

  # === BASS LAYER (4 tracks) ===
  BASS:
    role: bass
    color: 16         # Deep blue
    volume_db: -3.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Defiant_Sub"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start   # first 4 bars of each drop
        closed: 0.2
        open: 0.75

  SUB:
    role: sub
    color: 17         # Darker blue
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Void_Sub"
    active_sections: [drop, vip]
    automation:
      - param: Volume
        shape: sidechain
        trigger: drop         # every beat in drop sections
        duck_depth: 0.3

  GROWL:
    role: growl
    color: 60         # Orange-red
    volume_db: -4.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Fracture_Growl"
    active_sections: [drop]   # only later drops (auto-escalation)
    escalation: true          # only activates in drop 2+
    automation:
      - param: Filter_Cutoff
        shape: sawtooth
        trigger: drop
        min: 0.15
        max: 0.8
        cycles_per_bar: 2
      - param: Macro1
        shape: ramp
        trigger: drop
        start: 0.2
        end: 0.85

  WOBBLE:
    role: wobble
    color: 12         # Purple
    volume_db: -5.0
    pan: 0.1
    synth: "Serum 2"
    preset_name: "{TRACK}_Agony_Wobble"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: sine
        trigger: drop
        min: 0.2
        max: 0.85
        cycles_per_bar: 2

  RIDDIM:
    role: riddim
    color: 13         # Magenta
    volume_db: -5.0
    pan: -0.1
    synth: "Serum 2"
    preset_name: "{TRACK}_Riddim_Rage"
    active_sections: [drop, vip]
    # 5 rhythmic variations auto-cycled: quarter/stutter/triplet/bounce/minimal
    riddim_variations: [quarter, stutter, triplet, bounce, minimal]
    automation:
      - param: Macro1
        shape: sawtooth
        trigger: drop
        min: 0.1
        max: 0.9
        cycles_per_bar: 1

  FORMANT:
    role: formant
    color: 14         # Pink
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Phantom_Vowel"
    active_sections: [drop]
    escalation: true          # drop 2+ only
    automation:
      - param: Macro1
        shape: sine
        trigger: drop
        min: 0.1
        max: 0.9
        cycles_per_bar: 0.25  # slow vowel morph

  # === MELODIC LAYER (6 tracks) ===
  LEAD:
    role: lead
    color: 25         # Yellow
    volume_db: -4.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Screech_Ascend"
    active_sections: [drop, build, vip]
    send_a:     # Reverb send per section type
      intro: 0.0
      build: 0.3
      drop: 0.6
      break: 0.0
      vip: 0.25
      outro: 0.0

  COUNTER:
    role: counter
    color: 26         # Green-yellow
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_KS_Whisper"
    active_sections: [drop, build, vip]
    send_a:
      drop: 0.5
      vip: 0.3
      build: 0.2

  VOCAL_CHOP:
    role: vocal_chop
    color: 41         # Teal
    volume_db: -5.0
    pan: 0.2
    synth: "Serum 2"
    preset_name: "{TRACK}_Cry_Chop"
    active_sections: [drop, vip]
    send_b:     # Delay send
      drop: 0.4
      vip: 0.5

  CHORDS:
    role: chords
    color: 45         # Green
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Dark_Reese"
    active_sections: [drop, verse, bridge]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.4
        open: 0.85
    send_a:
      drop: 0.4
      verse: 0.5
      bridge: 0.6

  PAD:
    role: pad
    color: 46         # Lighter green
    volume_db: -9.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Void_Atmosphere"
    active_sections: [intro, verse, break, bridge, outro]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: intro
        closed: 0.15
        open: 0.7
    send_a:
      intro: 0.7
      verse: 0.65
      break: 0.75
      bridge: 0.7
      outro: 0.8

  ARP:
    role: arp
    color: 50         # Cyan
    volume_db: -8.0
    pan: -0.3
    synth: "Serum 2"
    preset_name: "{TRACK}_Ghost_Arp"
    active_sections: [drop, bridge, vip]
    send_b:
      drop: 0.5
      bridge: 0.6
      vip: 0.45

  # === UTILITY LAYER ===
  FX:
    role: fx
    color: 3          # White
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Impact_Boom"
    active_sections: [drop, build]
    # One-shot impacts at section transitions

  RISER:
    role: riser
    color: 4          # Light grey
    volume_db: -8.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "{TRACK}_Harmonic_Rise"
    active_sections: [build]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: build
        closed: 0.1
        open: 1.0
        curve: 0.5
      - param: Volume
        shape: ramp
        trigger: build
        start: 0.2
        end: 1.0

# ───────────────────────────────────────────────────────────
# RETURN TRACKS (FX Sends)
# ───────────────────────────────────────────────────────────

returns:
  REVERB:
    send_id: A
    color: 57         # Blue-grey
    volume_db: -6.0
    # Tracks routed here: LEAD, COUNTER, CHORDS, PAD

  DELAY:
    send_id: B
    color: 58         # Grey
    volume_db: -6.0
    # Tracks routed here: VOCAL_CHOP, ARP

# ───────────────────────────────────────────────────────────
# DRUM PATTERNS (per section type)
# ───────────────────────────────────────────────────────────
# Each pattern is a list of hits per beat in a 4-beat bar.
# Velocity defaults can be overridden per section.

drum_patterns:
  intro:
    density: sparse
    kick: [0]                      # beat 1 only
    hh_cl: [0, 1, 2, 3]           # every beat, low vel
    base_velocity: 60
    notes: "Sparse. Builds anticipation. Hats only first 4 bars."

  build:
    density: accelerating
    kick: [0, 2]                   # 1 and 3
    snare: [1, 3]                  # 2 and 4
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]  # 8ths
    base_velocity: 80
    snare_roll: true               # last 2 bars: 16th snare fill
    notes: "Building density. Snare roll at end."

  drop:
    density: full
    kick: [0, 1, 2, 3]            # four-on-floor
    snare: [1, 3]                  # backbeat
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]  # 8ths
    hh_op: [0.75, 2.75]           # off-beat opens for groove
    base_velocity: 110
    notes: "Full energy. Four-on-floor kick. Heavy snare."

  break:
    density: minimal
    kick: [0]
    perc_1: [1.5, 3.5]            # ghost perc hits
    base_velocity: 70
    snare_roll: true               # last bar only
    notes: "Breathing room. Minimal kick + ghost perc."

  bridge:
    density: half
    kick: [0, 2]
    snare: [2]                     # half-time snare
    hh_cl: [0, 1, 2, 3]
    base_velocity: 75
    notes: "Half-time feel. Space for melodic content."

  outro:
    density: decaying
    kick: [0]
    hh_cl: [0, 2]
    base_velocity: 50
    notes: "Fading out. Minimal elements."

# ───────────────────────────────────────────────────────────
# MIDI GENERATION RULES
# ───────────────────────────────────────────────────────────

midi_rules:
  bass:
    pattern: root_per_chord      # root note per 2-bar chord cycle
    octave_offset: 0
    default_velocity: 100
    duration: 1.5                # beats

  sub:
    pattern: root_per_chord
    octave_offset: -1            # one octave below bass
    default_velocity: 90
    duration: 3.5                # longer sustain

  growl:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 105
    duration: 1.0

  wobble:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 100
    duration: 2.0

  riddim:
    pattern: rhythmic_chop       # rhythmic variations cycled per drop
    octave_offset: 0
    default_velocity: 100

  formant:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 95
    duration: 2.0

  lead:
    pattern: ascending_phrase    # 4-bar ascending motif
    notes: [A3, C4, D4, F4]     # default motif
    default_velocity: 95

  counter:
    pattern: descending_phrase   # 4-bar descending answer
    notes: [F4, D4, C4, A3]
    default_velocity: 85

  vocal_chop:
    pattern: rhythmic_hits       # syncopated hits
    default_velocity: 100

  chords:
    pattern: chord_voicing       # full harmonic voicing per chord index
    default_velocity: 80

  pad:
    pattern: sustained_chord     # long notes, slow attack
    default_velocity: 70
    duration: 8.0                # 2 bars sustained

  arp:
    pattern: arpeggio            # 16th note arpeggiated chord tones
    default_velocity: 85

  fx:
    pattern: transition_hit      # one-shots at section boundaries
    default_velocity: 110

  riser:
    pattern: sustained_note      # single rising note through build
    default_velocity: 90
    duration: section_length     # entire build section

# ───────────────────────────────────────────────────────────
# SOUND DESIGN PRESETS (Serum 2 Macro assignments)
# ───────────────────────────────────────────────────────────
# These define the preset character per role.
# Actual .fxp generation uses engine.serum2_preset

serum_macros:
  bass:
    macro_1: { label: DRIVE,      default: 40 }
    macro_2: { label: FILTER,     default: 50 }
    macro_3: { label: SUB MIX,    default: 80 }
    macro_4: { label: MOVEMENT,   default: 30 }

  growl:
    macro_1: { label: GRIT,       default: 65 }
    macro_2: { label: FORMANT,    default: 50 }
    macro_3: { label: FM DEPTH,   default: 40 }
    macro_4: { label: CHAOS,      default: 55 }

  wobble:
    macro_1: { label: RATE,       default: 50 }
    macro_2: { label: DEPTH,      default: 70 }
    macro_3: { label: TONE,       default: 45 }
    macro_4: { label: FEEDBACK,   default: 35 }

  lead:
    macro_1: { label: BRIGHTNESS, default: 60 }
    macro_2: { label: DETUNE,     default: 20 }
    macro_3: { label: SPACE,      default: 40 }
    macro_4: { label: ATTACK,     default: 15 }

  pad:
    macro_1: { label: TEXTURE,    default: 30 }
    macro_2: { label: FILTER,     default: 40 }
    macro_3: { label: WIDTH,      default: 70 }
    macro_4: { label: DECAY,      default: 60 }

# ───────────────────────────────────────────────────────────
# PRODUCTION INSIGHTS
# (ill.Gates Dojo + Subtronics techniques)
# ───────────────────────────────────────────────────────────

insights:
  dojo_workflow:
    - "Phase-based: Sound Design → Arrangement → Mix → Master"
    - "ill.Gates 128s: use sampler instruments with 128 samples for instant palettes"
    - "Mudpies: drag session clips into sampler for resampling"
    - "Infinite Drum Rack: layered drum design with macro control"
    - "Template first: always start from a pre-configured session"
    - "One Thing at a time: focus each phase completely before moving on"

  subtronics_techniques:
    - "Fibonacci structure: bar counts from the sequence (3,5,8,13,21,34)"
    - "Sound design contrast: alternate weapon/emotive between sections"
    - "Cyclops-style layering: sub + growl + wobble = the 'wall of bass'"
    - "Riddim chop variations: 5+ rhythmic patterns cycled across drops"
    - "Half-time snare in breaks for contrast against four-on-floor drops"
    - "Macro automation: Serum macros automated per-section for evolving sound"
    - "Golden section: place climax drop at ~61.8% through the track"
    - "Fractal repetition: motifs repeat at different time scales"
    - "String Theory: use detuned unison for thick leads"
    - "Tesseract layering: 4+ bass layers with frequency splitting"
