# ═══════════════════════════════════════════════════════════════════════════
# DUBFORGE — CRYSTAL THEOREM
# ═══════════════════════════════════════════════════════════════════════════
# Melodic emotional dubstep. 140 BPM, Ab minor.
# Ethereal pads, long builds, cinematic breaks, soaring leads.
# Au5 / Seven Lions / Illenium energy.

version: "1.0"
template_name: CRYSTAL_THEOREM

global:
  bpm: 140
  time_sig: [4, 4]
  key: Ab_minor
  tuning_a4: 432
  total_bars: 144
  golden_ratio: 0.618

  chord_progression:
    - Ab2   # i
    - E2    # VI (Cb enharmonic)
    - Gb2   # VII (bVII)
    - Eb2   # v

  humanize:
    enabled: true
    strength: 0.18
    method: phi_sine

# ═══════════════════════════════════════════════════════════════════════════
# ARRANGEMENT — Melodic, build-heavy with emotional peaks
# Long atmospheric sections, cinematic breaks
# ═══════════════════════════════════════════════════════════════════════════

arrangement:
  - { name: DAWN,           type: intro,   bars: 8  }
  - { name: AWAKENING,      type: verse,   bars: 8  }
  - { name: ASCENT_1,       type: build,   bars: 8  }
  - { name: REVELATION_1,   type: drop,    bars: 13 }
  - { name: REFLECTION,     type: break,   bars: 8  }
  - { name: REVERIE,        type: bridge,  bars: 5  }
  - { name: ASCENT_2,       type: build,   bars: 8  }
  - { name: REVELATION_2,   type: drop,    bars: 21 }  # golden section
  - { name: STILLNESS,      type: break,   bars: 5  }
  - { name: ASCENT_3,       type: build,   bars: 8  }
  - { name: TRANSCENDENCE,  type: drop,    bars: 21 }
  - { name: MEMORY,         type: break,   bars: 13 }
  - { name: DUSK,           type: outro,   bars: 18 }

tracks:
  DRUMS:
    role: drums
    color: 45
    volume_db: -1.0
    pan: 0.0
    synth: null
    pads:
      - { note: 36, name: Kick,     choke: -1 }
      - { note: 37, name: Rim,      choke: 2  }
      - { note: 38, name: Snare,    choke: -1 }
      - { note: 39, name: Clap,     choke: -1 }
      - { note: 42, name: HH_Cl,    choke: 1  }
      - { note: 46, name: HH_Op,    choke: 1  }
      - { note: 49, name: Crash,    choke: -1 }
      - { note: 51, name: Ride,     choke: -1 }
      - { note: 56, name: Perc_1,   choke: -1 }
      - { note: 57, name: Perc_2,   choke: -1 }
      - { note: 75, name: Clav,     choke: -1 }

  BASS:
    role: bass
    color: 50
    volume_db: -4.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Warm_Bass"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.25
        open: 0.7

  SUB:
    role: sub
    color: 51
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Deep_Sub"
    active_sections: [drop, vip]
    automation:
      - param: Volume
        shape: sidechain
        trigger: drop
        duck_depth: 0.25

  GROWL:
    role: growl
    color: 41
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Soft_Growl"
    active_sections: [drop]
    escalation: true
    automation:
      - param: Filter_Cutoff
        shape: sawtooth
        trigger: drop
        min: 0.2
        max: 0.7
        cycles_per_bar: 1
      - param: Macro1
        shape: ramp
        trigger: drop
        start: 0.3
        end: 0.7

  WOBBLE:
    role: wobble
    color: 42
    volume_db: -6.0
    pan: 0.1
    synth: "Serum 2"
    preset_name: "CRYSTAL_Shimmer_Wobble"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: sine
        trigger: drop
        min: 0.3
        max: 0.8
        cycles_per_bar: 1

  RIDDIM:
    role: riddim
    color: 43
    volume_db: -7.0
    pan: -0.1
    synth: "Serum 2"
    preset_name: "CRYSTAL_Pulse_Riddim"
    active_sections: [drop, vip]
    riddim_variations: [quarter, minimal, bounce, quarter, minimal]
    automation:
      - param: Macro1
        shape: sawtooth
        trigger: drop
        min: 0.2
        max: 0.7
        cycles_per_bar: 0.5

  FORMANT:
    role: formant
    color: 44
    volume_db: -7.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Choir_Formant"
    active_sections: [drop]
    escalation: true
    automation:
      - param: Macro1
        shape: sine
        trigger: drop
        min: 0.2
        max: 0.8
        cycles_per_bar: 0.125

  LEAD:
    role: lead
    color: 25
    volume_db: -3.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Soaring_Lead"
    active_sections: [drop, build, verse, bridge, vip]
    send_a:
      verse: 0.5
      build: 0.4
      drop: 0.65
      bridge: 0.6
      vip: 0.3

  COUNTER:
    role: counter
    color: 26
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Echo_Counter"
    active_sections: [drop, build, bridge, vip]
    send_a:
      drop: 0.55
      vip: 0.35
      build: 0.3
      bridge: 0.5

  VOCAL_CHOP:
    role: vocal_chop
    color: 41
    volume_db: -4.0
    pan: 0.2
    synth: "Serum 2"
    preset_name: "CRYSTAL_Ethereal_Chop"
    active_sections: [drop, bridge, vip]
    send_b:
      drop: 0.45
      bridge: 0.6
      vip: 0.5

  CHORDS:
    role: chords
    color: 46
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Glass_Chord"
    active_sections: [drop, verse, bridge, build]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.45
        open: 0.9
    send_a:
      drop: 0.5
      verse: 0.6
      bridge: 0.7
      build: 0.45

  PAD:
    role: pad
    color: 47
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Celestial_Pad"
    active_sections: [intro, verse, break, bridge, outro]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: intro
        closed: 0.2
        open: 0.8
    send_a:
      intro: 0.8
      verse: 0.7
      break: 0.85
      bridge: 0.75
      outro: 0.9

  ARP:
    role: arp
    color: 50
    volume_db: -6.0
    pan: -0.25
    synth: "Serum 2"
    preset_name: "CRYSTAL_Prism_Arp"
    active_sections: [drop, bridge, build, vip]
    send_b:
      drop: 0.5
      bridge: 0.65
      build: 0.4
      vip: 0.45

  FX:
    role: fx
    color: 3
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Impact_Shimmer"
    active_sections: [drop, build]

  RISER:
    role: riser
    color: 4
    volume_db: -7.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "CRYSTAL_Harmonic_Rise"
    active_sections: [build]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: build
        closed: 0.1
        open: 1.0
        curve: 0.3
      - param: Volume
        shape: ramp
        trigger: build
        start: 0.1
        end: 1.0

returns:
  REVERB:
    send_id: A
    color: 57
    volume_db: -5.0

  DELAY:
    send_id: B
    color: 58
    volume_db: -5.0

drum_patterns:
  intro:
    density: sparse
    hh_cl: [0, 1, 2, 3]
    base_velocity: 50
    notes: "Delicate. Hats only. Sunrise feel."

  verse:
    density: gentle
    kick: [0, 2]
    snare: [2]
    hh_cl: [0, 1, 2, 3]
    hh_op: [1.5, 3.5]
    base_velocity: 70
    notes: "Half-time feel. Space for vocals and melody."

  build:
    density: accelerating
    kick: [0, 2]
    snare: [1, 3]
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]
    base_velocity: 80
    snare_roll: true
    notes: "Cinematic build. Snare roll climax."

  drop:
    density: full
    kick: [0, 1, 2, 3]
    snare: [1, 3]
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]
    hh_op: [0.75, 2.75]
    base_velocity: 105
    notes: "Melodic drop. Energy with space."

  break:
    density: minimal
    perc_1: [0, 2]
    perc_2: [1, 3]
    base_velocity: 55
    notes: "Reflection. Gentle percussion only."

  bridge:
    density: half
    kick: [0]
    snare: [2]
    hh_cl: [0, 1, 2, 3]
    hh_op: [1.5]
    base_velocity: 65
    notes: "Dreamy half-time. Floating feel."

  outro:
    density: decaying
    hh_cl: [0, 2]
    perc_1: [1]
    base_velocity: 40
    notes: "Fading into silence. Dust and light."

midi_rules:
  bass:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 95
    duration: 2.0

  sub:
    pattern: root_per_chord
    octave_offset: -1
    default_velocity: 85
    duration: 3.5

  growl:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 90
    duration: 1.5

  wobble:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 90
    duration: 2.5

  riddim:
    pattern: rhythmic_chop
    octave_offset: 0
    default_velocity: 85

  formant:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 80
    duration: 3.0

  lead:
    pattern: ascending_phrase
    notes: [Ab3, B3, Eb4, Gb4]
    default_velocity: 90

  counter:
    pattern: descending_phrase
    notes: [Gb4, Eb4, B3, Ab3]
    default_velocity: 80

  vocal_chop:
    pattern: rhythmic_hits
    default_velocity: 95

  chords:
    pattern: chord_voicing
    default_velocity: 75

  pad:
    pattern: sustained_chord
    default_velocity: 65
    duration: 8.0

  arp:
    pattern: arpeggio
    default_velocity: 80

  fx:
    pattern: transition_hit
    default_velocity: 105

  riser:
    pattern: sustained_note
    default_velocity: 85
    duration: section_length
