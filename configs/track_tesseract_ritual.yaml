# DUBFORGE — Track: TESSERACT RITUAL
# Experimental bass/halftime, C minor, 135 BPM
# Character: Dark ritual, halftime drops, massive space, occult

version: "1.0"
template_name: TESSERACT_RITUAL

global:
  bpm: 135
  time_sig: [4, 4]
  key: C_minor
  tuning_a4: 432
  total_bars: 144
  golden_ratio: 0.618
  chord_progression:
    - C2
    - Eb2
    - Ab2
    - G2
  humanize:
    enabled: true
    strength: 0.2
    method: phi_sine

arrangement:
  - { name: INTRO,      type: intro,   bars: 21 }
  - { name: BUILD_1,    type: build,   bars: 5  }
  - { name: DROP_1,     type: drop,    bars: 13 }
  - { name: BREAK_1,    type: break,   bars: 13 }
  - { name: BRIDGE,     type: bridge,  bars: 8  }
  - { name: BUILD_2,    type: build,   bars: 8  }
  - { name: DROP_2,     type: drop,    bars: 21 }
  - { name: BREAK_2,    type: break,   bars: 5  }
  - { name: BUILD_3,    type: build,   bars: 5  }
  - { name: DROP_3,     type: drop,    bars: 21 }
  - { name: OUTRO,      type: outro,   bars: 24 }

tracks:
  DRUMS:
    role: drums
    color: 69
    volume_db: -1.0
    pan: 0.0
    synth: null
    pads:
      - { note: 36, name: Kick,   choke: -1 }
      - { note: 37, name: Rim,    choke: 2  }
      - { note: 38, name: Snare,  choke: -1 }
      - { note: 39, name: Clap,   choke: -1 }
      - { note: 42, name: HH_Cl,  choke: 1  }
      - { note: 46, name: HH_Op,  choke: 1  }
      - { note: 49, name: Crash,  choke: -1 }
      - { note: 51, name: Ride,   choke: -1 }
      - { note: 56, name: Perc_1, choke: -1 }
      - { note: 57, name: Perc_2, choke: -1 }
      - { note: 75, name: Clav,   choke: -1 }

  BASS:
    role: bass
    color: 16
    volume_db: -3.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Doom_Sub"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.2
        open: 0.7

  SUB:
    role: sub
    color: 17
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Ritual_Sub"
    active_sections: [drop, vip]
    automation:
      - param: Volume
        shape: sidechain
        trigger: drop
        duck_depth: 0.35

  GROWL:
    role: growl
    color: 60
    volume_db: -4.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Occult_Growl"
    active_sections: [drop]
    escalation: true
    automation:
      - param: Filter_Cutoff
        shape: sawtooth
        trigger: drop
        min: 0.15
        max: 0.75
        cycles_per_bar: 1
      - param: Macro1
        shape: ramp
        trigger: drop
        start: 0.2
        end: 0.8

  WOBBLE:
    role: wobble
    color: 12
    volume_db: -5.0
    pan: 0.1
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Hex_Wobble"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: sine
        trigger: drop
        min: 0.2
        max: 0.8
        cycles_per_bar: 1

  RIDDIM:
    role: riddim
    color: 13
    volume_db: -5.0
    pan: -0.1
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Riddim_Hex"
    active_sections: [drop, vip]
    riddim_variations: [minimal, quarter, bounce, triplet, stutter]
    automation:
      - param: Macro1
        shape: sawtooth
        trigger: drop
        min: 0.1
        max: 0.8
        cycles_per_bar: 0.5

  FORMANT:
    role: formant
    color: 14
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Sigil_Vowel"
    active_sections: [drop]
    escalation: true
    automation:
      - param: Macro1
        shape: sine
        trigger: drop
        min: 0.1
        max: 0.85
        cycles_per_bar: 0.15

  LEAD:
    role: lead
    color: 25
    volume_db: -4.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Wail_Lead"
    active_sections: [drop, build, bridge]
    send_a:
      build: 0.4
      drop: 0.6
      bridge: 0.5

  COUNTER:
    role: counter
    color: 26
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Bell_Counter"
    active_sections: [drop, build]
    send_a:
      drop: 0.5
      build: 0.3

  VOCAL_CHOP:
    role: vocal_chop
    color: 41
    volume_db: -5.0
    pan: 0.15
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Chant_Chop"
    active_sections: [drop, vip]
    send_b:
      drop: 0.55

  CHORDS:
    role: chords
    color: 45
    volume_db: -5.5
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Drone_Reese"
    active_sections: [drop, bridge]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.3
        open: 0.75
    send_a:
      drop: 0.45
      bridge: 0.6

  PAD:
    role: pad
    color: 46
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Void_Choir"
    active_sections: [intro, break, bridge, outro]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: intro
        closed: 0.1
        open: 0.6
    send_a:
      intro: 0.85
      break: 0.8
      bridge: 0.75
      outro: 0.9

  ARP:
    role: arp
    color: 50
    volume_db: -8.0
    pan: -0.3
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Rune_Arp"
    active_sections: [drop, bridge]
    send_b:
      drop: 0.5
      bridge: 0.65

  FX:
    role: fx
    color: 3
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Ritual_Impact"
    active_sections: [drop, build]

  RISER:
    role: riser
    color: 4
    volume_db: -7.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "TESSERACT_RITUAL_Summon_Rise"
    active_sections: [build]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: build
        closed: 0.05
        open: 1.0
        curve: 0.7
      - param: Volume
        shape: ramp
        trigger: build
        start: 0.1
        end: 1.0

returns:
  REVERB:
    send_id: A
    color: 57
    volume_db: -4.0
  DELAY:
    send_id: B
    color: 58
    volume_db: -5.0

drum_patterns:
  intro:
    density: sparse
    kick: []
    perc_1: [0, 2]
    base_velocity: 45
  build:
    density: accelerating
    kick: [0, 2]
    snare: [2]
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]
    base_velocity: 78
    snare_roll: true
  drop:
    density: full
    kick: [0, 2]
    snare: [2]
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]
    hh_op: [0.75, 2.75]
    base_velocity: 100
  break:
    density: minimal
    perc_1: [1.5, 3.5]
    base_velocity: 55
    snare_roll: true
  bridge:
    density: half
    kick: [0, 2]
    snare: [2]
    hh_cl: [0, 1, 2, 3]
    base_velocity: 68
  outro:
    density: decaying
    perc_1: [0]
    base_velocity: 40

midi_rules:
  bass:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 95
    duration: 2.5
  sub:
    pattern: root_per_chord
    octave_offset: -1
    default_velocity: 88
    duration: 4.0
  growl:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 100
    duration: 2.0
  wobble:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 90
    duration: 3.0
  riddim:
    pattern: rhythmic_chop
    octave_offset: 0
    default_velocity: 92
  formant:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 88
    duration: 3.0
  lead:
    pattern: ascending_phrase
    notes: [C3, Eb3, G3, Ab3]
    default_velocity: 90
  counter:
    pattern: descending_phrase
    notes: [Ab3, G3, Eb3, C3]
    default_velocity: 78
  vocal_chop:
    pattern: rhythmic_hits
    default_velocity: 92
  chords:
    pattern: chord_voicing
    default_velocity: 72
  pad:
    pattern: sustained_chord
    default_velocity: 65
    duration: 8.0
  arp:
    pattern: arpeggio
    default_velocity: 78
  fx:
    pattern: transition_hit
    default_velocity: 105
  riser:
    pattern: sustained_note
    default_velocity: 85
    duration: section_length
