# ═══════════════════════════════════════════════════════════════════════════
# DUBFORGE — VOID PROTOCOL
# ═══════════════════════════════════════════════════════════════════════════
# Aggressive weapon-grade dubstep. 148 BPM, F minor.
# Heavy bass emphasis, short breaks, relentless drops.
# Subtronics / Virtual Riot energy.

version: "1.0"
template_name: VOID_PROTOCOL

global:
  bpm: 148
  time_sig: [4, 4]
  key: F_minor
  tuning_a4: 432
  total_bars: 144
  golden_ratio: 0.618

  chord_progression:
    - F2    # i
    - Db2   # VI
    - Eb2   # VII
    - C2    # v

  humanize:
    enabled: true
    strength: 0.12
    method: phi_sine

# ═══════════════════════════════════════════════════════════════════════════
# ARRANGEMENT — Aggressive, drop-heavy
# Short breaks, maximum energy density
# ═══════════════════════════════════════════════════════════════════════════

arrangement:
  - { name: VOID_INIT,      type: intro,   bars: 5  }
  - { name: CHARGE_1,       type: build,   bars: 8  }
  - { name: ASSAULT_1,      type: drop,    bars: 21 }
  - { name: RELOAD,         type: break,   bars: 3  }
  - { name: CHARGE_2,       type: build,   bars: 5  }
  - { name: ASSAULT_2,      type: drop,    bars: 34 }
  - { name: DEAD_AIR,       type: break,   bars: 2  }
  - { name: CHARGE_3,       type: build,   bars: 5  }
  - { name: ANNIHILATE,     type: drop,    bars: 21 }  # golden section
  - { name: STATIC,         type: break,   bars: 3  }
  - { name: CHARGE_4,       type: build,   bars: 8  }
  - { name: EXTINCTION,     type: drop,    bars: 21 }
  - { name: VOID_OUT,       type: outro,   bars: 8  }

tracks:
  DRUMS:
    role: drums
    color: 69
    volume_db: 0.0
    pan: 0.0
    synth: null
    pads:
      - { note: 36, name: Kick,     choke: -1 }
      - { note: 37, name: Rim,      choke: 2  }
      - { note: 38, name: Snare,    choke: -1 }
      - { note: 39, name: Clap,     choke: -1 }
      - { note: 42, name: HH_Cl,    choke: 1  }
      - { note: 46, name: HH_Op,    choke: 1  }
      - { note: 49, name: Crash,    choke: -1 }
      - { note: 51, name: Ride,     choke: -1 }
      - { note: 56, name: Perc_1,   choke: -1 }
      - { note: 57, name: Perc_2,   choke: -1 }
      - { note: 75, name: Clav,     choke: -1 }

  BASS:
    role: bass
    color: 16
    volume_db: -2.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Annihilator_Bass"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.1
        open: 0.85

  SUB:
    role: sub
    color: 17
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Abyss_Sub"
    active_sections: [drop, vip]
    automation:
      - param: Volume
        shape: sidechain
        trigger: drop
        duck_depth: 0.35

  GROWL:
    role: growl
    color: 60
    volume_db: -3.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Fracture_Growl"
    active_sections: [drop]
    escalation: true
    automation:
      - param: Filter_Cutoff
        shape: sawtooth
        trigger: drop
        min: 0.1
        max: 0.9
        cycles_per_bar: 3
      - param: Macro1
        shape: ramp
        trigger: drop
        start: 0.15
        end: 0.95

  WOBBLE:
    role: wobble
    color: 12
    volume_db: -4.0
    pan: 0.15
    synth: "Serum 2"
    preset_name: "VOID_Decay_Wobble"
    active_sections: [drop, vip]
    automation:
      - param: Filter_Cutoff
        shape: sine
        trigger: drop
        min: 0.15
        max: 0.9
        cycles_per_bar: 3

  RIDDIM:
    role: riddim
    color: 13
    volume_db: -4.0
    pan: -0.15
    synth: "Serum 2"
    preset_name: "VOID_Riddim_Crusher"
    active_sections: [drop, vip]
    riddim_variations: [stutter, triplet, quarter, stutter, bounce]
    automation:
      - param: Macro1
        shape: sawtooth
        trigger: drop
        min: 0.05
        max: 0.95
        cycles_per_bar: 2

  FORMANT:
    role: formant
    color: 14
    volume_db: -4.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Scream_Formant"
    active_sections: [drop]
    escalation: true
    automation:
      - param: Macro1
        shape: sine
        trigger: drop
        min: 0.05
        max: 0.95
        cycles_per_bar: 0.5

  LEAD:
    role: lead
    color: 25
    volume_db: -3.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Screech_Lead"
    active_sections: [drop, build, vip]
    send_a:
      build: 0.25
      drop: 0.5
      vip: 0.2

  COUNTER:
    role: counter
    color: 26
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Echo_Counter"
    active_sections: [drop, build, vip]
    send_a:
      drop: 0.4
      vip: 0.25
      build: 0.15

  VOCAL_CHOP:
    role: vocal_chop
    color: 41
    volume_db: -4.0
    pan: 0.2
    synth: "Serum 2"
    preset_name: "VOID_Glitch_Chop"
    active_sections: [drop, vip]
    send_b:
      drop: 0.5
      vip: 0.6

  CHORDS:
    role: chords
    color: 45
    volume_db: -6.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Dark_Stab"
    active_sections: [drop, build]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: drop_start
        closed: 0.3
        open: 0.9
    send_a:
      drop: 0.35
      build: 0.4

  PAD:
    role: pad
    color: 46
    volume_db: -9.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Dread_Atmosphere"
    active_sections: [intro, break, outro]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: intro
        closed: 0.1
        open: 0.6
    send_a:
      intro: 0.8
      break: 0.7
      outro: 0.9

  ARP:
    role: arp
    color: 50
    volume_db: -7.0
    pan: -0.3
    synth: "Serum 2"
    preset_name: "VOID_Razor_Arp"
    active_sections: [drop, vip]
    send_b:
      drop: 0.55
      vip: 0.5

  FX:
    role: fx
    color: 3
    volume_db: -5.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Impact_Boom"
    active_sections: [drop, build]

  RISER:
    role: riser
    color: 4
    volume_db: -7.0
    pan: 0.0
    synth: "Serum 2"
    preset_name: "VOID_Siren_Riser"
    active_sections: [build]
    automation:
      - param: Filter_Cutoff
        shape: lp_sweep
        trigger: build
        closed: 0.05
        open: 1.0
        curve: 0.5
      - param: Volume
        shape: ramp
        trigger: build
        start: 0.15
        end: 1.0

returns:
  REVERB:
    send_id: A
    color: 57
    volume_db: -7.0

  DELAY:
    send_id: B
    color: 58
    volume_db: -7.0

drum_patterns:
  intro:
    density: sparse
    kick: [0]
    hh_cl: [0, 2]
    base_velocity: 55
    notes: "Dark sparse. Tension building."

  build:
    density: accelerating
    kick: [0, 2]
    snare: [1, 3]
    hh_cl: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]
    base_velocity: 85
    snare_roll: true
    notes: "Aggressive build. Double-time snare roll."

  drop:
    density: full
    kick: [0, 1, 2, 3]
    snare: [1, 3]
    hh_cl: [0, 0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.25, 2.5, 2.75, 3, 3.25, 3.5, 3.75]
    hh_op: [0.75, 2.75]
    perc_1: [0.5, 2.5]
    base_velocity: 120
    notes: "Maximum impact. 16th hats, heavy kick."

  break:
    density: minimal
    kick: [0]
    perc_1: [1.5, 3.5]
    base_velocity: 65
    notes: "Dead air tension. Minimal."

  outro:
    density: decaying
    kick: [0]
    hh_cl: [0, 2]
    base_velocity: 45
    notes: "Void collapse."

midi_rules:
  bass:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 110
    duration: 1.0

  sub:
    pattern: root_per_chord
    octave_offset: -1
    default_velocity: 95
    duration: 3.0

  growl:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 115
    duration: 0.75

  wobble:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 105
    duration: 1.5

  riddim:
    pattern: rhythmic_chop
    octave_offset: 0
    default_velocity: 110

  formant:
    pattern: root_per_chord
    octave_offset: 0
    default_velocity: 100
    duration: 1.5

  lead:
    pattern: ascending_phrase
    notes: [F3, Ab3, C4, Eb4]
    default_velocity: 100

  counter:
    pattern: descending_phrase
    notes: [Eb4, C4, Ab3, F3]
    default_velocity: 90

  vocal_chop:
    pattern: rhythmic_hits
    default_velocity: 110

  chords:
    pattern: chord_voicing
    default_velocity: 85

  pad:
    pattern: sustained_chord
    default_velocity: 65
    duration: 8.0

  arp:
    pattern: arpeggio
    default_velocity: 90

  fx:
    pattern: transition_hit
    default_velocity: 120

  riser:
    pattern: sustained_note
    default_velocity: 95
    duration: section_length
