        stereo_width: 0.0
      LOW:
        freq_range: [89, 144]
        waveform: saw
        gain_db: -1.5
        phase_deg: 0
        distortion: 0.35
        stereo_width: 0.0
      MID:
        freq_range: [144, 233]
        waveform: wavetable
        gain_db: -2
        phase_deg: 90
        distortion: 0.65
        stereo_width: 0.5
      HIGH:
        freq_range: [233, 377]
        waveform: noise
        gain_db: -6
        phase_deg: 180
        distortion: 0.8
        stereo_width: 0.9
      CLICK:
        freq_range: [377, 610]
        waveform: fm
        gain_db: -5
        phase_deg: 0
        distortion: 0.5
        stereo_width: 0.5

  WOOK:
    root_hz: 55.0
    tuning_a4: 432
    crossover_mode: phi
    layers:
      SUB_FOLD:
        freq_range: [20, 40]
