# ===================================================================
# RCO — Rollercoaster Optimizer Configs
# ===================================================================

rco_profiles:

  WEAPON_16_32:
    description: "16-bar drops, 32-bar total drop zone. Weapon-class."
    bpm: 150
    time_signature: "4/4"
    sections:
      - { name: intro,   bars: 8,  energy: [0.0, 0.2],  curve: linear }
      - { name: build_1, bars: 8,  energy: [0.2, 0.85], curve: phi }
      - { name: drop_1,  bars: 16, energy: [1.0, 0.9],  curve: fibonacci_step }
      - { name: break_1, bars: 8,  energy: [0.3, 0.15], curve: phi }
      - { name: build_2, bars: 8,  energy: [0.15, 0.95], curve: exponential }
      - { name: drop_2,  bars: 16, energy: [1.0, 0.85], curve: fibonacci_step }
      - { name: break_2, bars: 8,  energy: [0.25, 0.1], curve: phi }
      - { name: build_3, bars: 8,  energy: [0.1, 1.0],  curve: phi }
      - { name: drop_3,  bars: 16, energy: [1.0, 0.8],  curve: fibonacci_step }
      - { name: outro,   bars: 8,  energy: [0.3, 0.0],  curve: linear }

  EMOTIVE_LONG:
    description: "Extended builds, melodic breaks. Emotive-class."
    bpm: 150
    sections:
      - { name: intro,     bars: 16, energy: [0.0, 0.3], curve: phi }
      - { name: verse_1,   bars: 16, energy: [0.3, 0.4], curve: linear }
      - { name: build_1,   bars: 8,  energy: [0.4, 0.85], curve: phi }
      - { name: drop_1,    bars: 16, energy: [0.9, 0.75], curve: fibonacci_step }
      - { name: break_1,   bars: 16, energy: [0.35, 0.2], curve: phi }
      - { name: build_2,   bars: 8,  energy: [0.2, 0.95], curve: phi }
      - { name: drop_2,    bars: 16, energy: [1.0, 0.8],  curve: fibonacci_step }
      - { name: outro,     bars: 16, energy: [0.3, 0.0],  curve: phi }

  PACK_WEAPON:
    description: >
      Fibonacci-derived weapon mode. Unlocked from Fibonacci Pt 1+2 analysis.
      Uses Fibonacci bar counts for all sections. Maximum fractal alignment.
    bpm: 150
    sections:
      - { name: intro,    bars: 8,   energy: [0.0, 0.2],  curve: phi }
      - { name: build_1,  bars: 5,   energy: [0.2, 0.9],  curve: phi }
      - { name: drop_1,   bars: 13,  energy: [1.0, 0.88], curve: fibonacci_step }
      - { name: break_1,  bars: 5,   energy: [0.3, 0.12], curve: phi }
      - { name: build_2,  bars: 8,   energy: [0.12, 1.0], curve: exponential }
      - { name: drop_2,   bars: 21,  energy: [1.0, 0.85], curve: fibonacci_step }
      - { name: break_2,  bars: 3,   energy: [0.2, 0.08], curve: phi }
      - { name: build_3,  bars: 5,   energy: [0.08, 1.0], curve: phi }
      - { name: drop_3,   bars: 13,  energy: [1.0, 0.75], curve: fibonacci_step }
      - { name: outro,    bars: 8,   energy: [0.25, 0.0], curve: linear }

# ===================================================================
# PSBS — Phase-Separated Bass System Configs
# ===================================================================

psbs_presets:

  DEFAULT:
    root_hz: 55.0
    tuning_a4: 432
    crossover_mode: phi
    layers:
      SUB:
        freq_range: [20, 89]
        waveform: sine
        gain_db: 0
        phase_deg: 0
        distortion: 0.0
        stereo_width: 0.0
      LOW:
        freq_range: [89, 144]
        waveform: saw
        gain_db: -3
        phase_deg: 0
        distortion: 0.15
        stereo_width: 0.0
      MID:
        freq_range: [144, 233]
        waveform: wavetable
        gain_db: -2
        phase_deg: 90
        distortion: 0.4
        stereo_width: 0.3
      HIGH:
        freq_range: [233, 377]
        waveform: noise
        gain_db: -6
        phase_deg: 180
        distortion: 0.6
        stereo_width: 0.7
      CLICK:
        freq_range: [377, 610]
        waveform: fm
        gain_db: -8
        phase_deg: 0
        distortion: 0.3
        stereo_width: 0.5

  WEAPON:
    root_hz: 55.0
    tuning_a4: 432
    crossover_mode: phi
    layers:
      SUB:
        freq_range: [20, 89]
        waveform: sine
